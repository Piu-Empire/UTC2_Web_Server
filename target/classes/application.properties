# ============================================================
# Server Configuration
# Cấu hình Web Server Spring Boot
# ============================================================

# server.port
#
# Port mà Spring Boot backend sẽ chạy.
#
# Port:
# là "cổng" để client truy cập backend.
#
# Ví dụ:
# server chạy port 8080:
# http://localhost:8080
#
# Nếu đổi:
# SERVER_PORT=9090
#
# thì backend sẽ thành:
# http://localhost:9090
#
# ${SERVER_PORT}
# → lấy giá trị từ file .env
#
# Nếu .env:
# SERVER_PORT=8080
#
# thì Spring sẽ tự thay:
# server.port=8080
server.port=${SERVER_PORT}



# ============================================================
# Database Configuration
# Cấu hình kết nối Database
# ============================================================

# spring.datasource.url
#
# URL dùng để kết nối tới database.
#
# datasource:
# nghĩa là nguồn dữ liệu.
#
# JDBC URL:
# Java dùng URL này để biết:
# - kết nối DB nào
# - host nào
# - port nào
# - database nào
#
# Ví dụ sau khi replace:
#
# spring.datasource.url=
# jdbc:mysql://localhost:3306/utc2app
#
# Ý nghĩa:
#
# mysql
# → loại database
#
# localhost
# → DB chạy trên máy hiện tại
#
# 3306
# → port mặc định MySQL
#
# utc2app
# → tên database
#
# useSSL=false
# → tắt SSL khi dev local
#
# serverTimezone=UTC
# → tránh lỗi timezone
#
# allowPublicKeyRetrieval=true
# → hỗ trợ MySQL 8 login
spring.datasource.url=${DB_URL}


# spring.datasource.username
#
# Username dùng đăng nhập MySQL.
#
# Ví dụ:
# root
#
# Tương đương:
#
# mysql -u root
spring.datasource.username=${DB_USERNAME}


# spring.datasource.password
#
# Password của MySQL account.
#
# Spring Boot sẽ dùng:
# username + password
#
# để login database.
#
# Nếu sai:
# backend sẽ crash lúc startup.
spring.datasource.password=${DB_PASSWORD}


# spring.datasource.driver-class-name
#
# JDBC Driver Java dùng để giao tiếp MySQL.
#
# Driver:
# là cầu nối Java ↔ Database
#
# com.mysql.cj.jdbc.Driver
# là driver chính thức của MySQL 8.
#
# cj:
# = Connector/J
spring.datasource.driver-class-name=${DB_DRIVER}



# ============================================================
# JPA / Hibernate Configuration
# ORM Framework Configuration
# ============================================================

# spring.jpa.hibernate.ddl-auto
#
# Hibernate xử lý database schema như nào.
#
# schema:
# cấu trúc database:
# - table
# - column
# - constraint
#
# Hibernate:
# ORM framework
#
# ORM:
# object ↔ relational mapping
#
# nghĩa là:
# Java object ↔ table database
#
# Các mode:
#
# validate
# → chỉ kiểm tra entity có khớp DB không
# → không tạo bảng
#
# update
# → tự update table
#
# create
# → xóa DB cũ tạo lại
#
# create-drop
# → tạo lúc chạy
# → xóa lúc tắt app
#
# none
# → Hibernate không đụng DB
#
# Production thường:
# validate
#
# Dev nhỏ:
# update
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}


# spring.jpa.show-sql
#
# Hiển thị SQL Hibernate generate ra.
#
# Ví dụ console:
#
# SELECT * FROM users;
#
# INSERT INTO users ...
#
# Rất hữu ích để debug.
#
# true
# → hiện SQL
#
# false
# → ẩn SQL
spring.jpa.show-sql=${JPA_SHOW_SQL}


# spring.jpa.properties.hibernate.format_sql
#
# Format SQL cho dễ đọc.
#
# false:
# SQL 1 dòng
#
# true:
# SQL xuống dòng đẹp hơn
#
# Dễ debug hơn nhiều.
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL}


# spring.jpa.properties.hibernate.dialect
#
# Hibernate dialect.
#
# dialect:
# bộ quy tắc SQL riêng cho từng DB.
#
# Vì:
# MySQL
# PostgreSQL
# Oracle
# SQL Server
#
# đều khác syntax SQL.
#
# Hibernate cần biết:
# đang dùng DB nào
#
# để generate SQL đúng.
#
# MySQL8Dialect
# → tối ưu cho MySQL 8
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT}



# ============================================================
# Flyway Configuration
# Database Migration System
# ============================================================

# spring.flyway.enabled
#
# Bật/tắt Flyway.
#
# Flyway:
# tool quản lý version database.
#
# Ví dụ:
#
# V1__create_users.sql
# V2__add_email.sql
#
# Khi app start:
# Flyway tự chạy migration chưa chạy.
#
# true
# → bật Flyway
#
# false
# → tắt Flyway
spring.flyway.enabled=${FLYWAY_ENABLED}


# spring.flyway.locations
#
# Thư mục chứa migration SQL.
#
# classpath:
# nghĩa là trong resources/
#
# Spring sẽ tìm:
#
# src/main/resources/db/migration
#
# rồi chạy các file:
#
# V1__xxx.sql
# V2__xxx.sql
#
# theo thứ tự version.
spring.flyway.locations=${FLYWAY_LOCATIONS}



# ============================================================
# JWT Configuration
# JSON Web Token
# ============================================================

# app.jwt.secret
#
# Secret key dùng ký JWT token.
#
# JWT:
# token xác thực đăng nhập.
#
# Secret key dùng để:
#
# - tạo chữ ký token
# - verify token
#
# Nếu lộ secret:
# hacker có thể fake token.
#
# Nên:
# - đủ dài
# - random mạnh
# - không commit github
app.jwt.secret=${JWT_SECRET}


# app.jwt.expiration
#
# Thời gian sống token.
#
# Đơn vị:
# milliseconds
#
# Ví dụ:
#
# 86400000
# = 24 giờ
#
# Hết thời gian:
# token invalid.
#
# User phải login lại.
app.jwt.expiration=${JWT_EXPIRATION}



# ============================================================
# Logging Configuration
# Hệ thống ghi log
# ============================================================

# logging.file.name
#
# File log Spring Boot sẽ ghi.
#
# Ví dụ:
#
# logs/app.log
#
# Nội dung:
#
# [INFO]
# Server started
#
# [ERROR]
# Database failed
#
# Log giúp:
# - debug
# - theo dõi lỗi
# - audit hệ thống
logging.file.name=${LOG_FILE}


# logging.level.root
#
# Mức log toàn hệ thống.
#
# TRACE
# → chi tiết nhất
#
# DEBUG
# → debug developer
#
# INFO
# → thông tin quan trọng
#
# WARN
# → cảnh báo
#
# ERROR
# → lỗi nghiêm trọng
#
# Production thường:
# INFO hoặc WARN
logging.level.root=${LOG_LEVEL_ROOT}


spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# logging.level.com.utc2
#
# Set level log riêng package com.utc2
#
# Ví dụ:
#
# toàn hệ thống:
# INFO
#
# nhưng package backend:
# DEBUG
#
# để debug dễ hơn
#
# com.utc2:
# package Java của project
logging.level.com.utc2=${LOG_LEVEL_APP}



# ============================================================
# Swagger / OpenAPI Configuration
# API Documentation
# ============================================================

# springdoc.api-docs.path
#
# URL JSON OpenAPI docs.
#
# Ví dụ:
#
# http://localhost:8080/api-docs
#
# JSON này chứa:
# - endpoint
# - request
# - response
# - schema
#
# Swagger UI sẽ đọc JSON này.
springdoc.api-docs.path=${API_DOCS_PATH}


# springdoc.swagger-ui.path
#
# URL giao diện Swagger UI.
#
# Ví dụ:
#
# http://localhost:8080/swagger-ui.html
#
# Có thể:
# - xem API
# - test API
# - gửi request trực tiếp
#
# Rất hữu ích khi dev backend/frontend.
springdoc.swagger-ui.path=${SWAGGER_UI_PATH}